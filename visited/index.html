  <style>
    :root {
      --visited: #ffcf5a;
      --visited-core: #e03a5d;
      --unvisited: #8da0aa;
      --sea: #0c2530;
      --land: #f2ead6;
    }

    body {
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 207, 90, .18), transparent 30%),
        radial-gradient(circle at 86% 18%, rgba(47, 176, 163, .16), transparent 36%),
        linear-gradient(135deg, #07171f, #122b35 48%, #221c22);
    }

    .visited-shell {
      min-height: calc(100vh - 68px);
      padding: clamp(14px, 3vw, 36px);
    }

    .visited-layout {
      max-width: 1480px;
      margin: 0 auto;
    }

    .map-panel {
      border: 1px solid rgba(255, 255, 255, .14);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .02)),
        #091d27;
      box-shadow: 0 34px 90px rgba(0, 0, 0, .34);
      min-height: calc(100vh - 140px);
      padding: clamp(12px, 2vw, 28px);
      overflow: hidden;
    }

    .world-map {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 200px);
      display: block;
    }

    .map-ocean {
      fill: var(--sea);
    }

    .map-vignette {
      fill: url(#ocean-vignette);
      pointer-events: none;
    }

    .map-current {
      fill: none;
      stroke: rgba(130, 220, 210, .20);
      stroke-width: 1;
      stroke-dasharray: 7 13;
    }

    .map-graticule {
      fill: none;
      stroke: rgba(255, 255, 255, .11);
      stroke-width: .8;
    }

    .land {
      fill: url(#land-gradient);
      stroke: rgba(255, 255, 255, .32);
      stroke-width: 1.1;
      filter: url(#land-shadow);
    }

    .island {
      fill: rgba(242, 234, 214, .78);
      stroke: rgba(255, 255, 255, .28);
      stroke-width: .8;
    }

    .city-marker {
      cursor: pointer;
    }

    .city-marker .marker-hit {
      fill: transparent;
      stroke: transparent;
      r: 12;
      transition: r .18s ease;
    }

    .city-marker.is-visited .marker-hit {
      r: 16;
    }

    .city-marker.is-visited.has-thumbnail .marker-hit {
      r: 28;
    }

    .city-marker .marker-halo {
      fill: rgba(255, 255, 255, .10);
      stroke: rgba(255, 255, 255, .26);
      stroke-width: 1;
      opacity: .5;
      transition: opacity .18s ease, r .18s ease;
    }

    .city-marker .marker-core {
      fill: #f8fbf6;
      stroke: var(--unvisited);
      stroke-width: 2.2;
      filter: url(#marker-shadow);
      transition: opacity .18s ease, fill .18s ease, stroke .18s ease, r .18s ease;
    }

    .city-marker .marker-thumb,
    .city-marker .marker-thumb-frame {
      opacity: 0;
      transition: opacity .18s ease;
    }

    .city-marker .marker-thumb {
      pointer-events: none;
    }

    .city-marker .marker-thumb-frame {
      fill: none;
      stroke: var(--visited);
      stroke-width: 2.2;
      filter: url(#marker-shadow);
    }

    .city-marker.is-visited .marker-halo {
      fill: rgba(255, 207, 90, .22);
      stroke: rgba(255, 207, 90, .52);
      opacity: 1;
      r: 32;
    }

    .city-marker.is-visited.has-thumbnail .marker-core {
      opacity: 0;
    }

    .city-marker.is-visited:not(.has-thumbnail) .marker-core {
      fill: var(--visited-core);
      stroke: var(--visited);
      r: 7;
    }

    .city-marker.is-visited .marker-thumb {
      opacity: 1;
    }

    .city-marker.is-visited .marker-thumb-frame {
      opacity: 1;
    }

    .city-marker.is-visited:not(.has-thumbnail) .marker-thumb,
    .city-marker.is-visited:not(.has-thumbnail) .marker-thumb-frame {
      opacity: 0;
    }

    .city-marker:focus-visible .marker-halo,
    .city-marker:hover .marker-halo {
      opacity: 1;
      r: 34;
    }

    .city-marker:focus-visible .marker-core,
    .city-marker:hover .marker-core {
      r: 8;
      stroke: var(--visited);
    }

    .city-marker:focus-visible .marker-thumb-frame,
    .city-marker:hover .marker-thumb-frame {
      stroke-width: 3.2;
    }

    @media (max-width: 980px) {
      .map-panel {
        min-height: auto;
      }

      .world-map {
        min-height: auto;
        aspect-ratio: 1.45;
      }
    }

    @media (max-width: 640px) {
      .visited-shell {
        padding-inline: 12px;
      }

      .map-panel {
        padding: 8px;
      }

    }
  </style>

    function svgElement(name, attributes = {}) {
      const element = document.createElementNS("http://www.w3.org/2000/svg", name);

      return element;

    function project(lon, lat) {
      return {
        x: (lon + 180) / 360 * MAP.width,
        y: (MAP.latMax - lat) / (MAP.latMax - MAP.latMin) * MAP.height
      };
    }

    function formatPoint(point) {
      return `${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
    }

    function drawBaseMap() {
      graticuleLayer.innerHTML = "";
      landLayer.innerHTML = "";
      currentLayer.innerHTML = "";

      for (let lon = -150; lon <= 150; lon += 30) {
        const top = project(lon, MAP.latMax);
        const bottom = project(lon, MAP.latMin);
        graticuleLayer.appendChild(svgElement("path", {
          class: "map-graticule",
          d: `M${formatPoint(top)}L${formatPoint(bottom)}`
        }));
      }

      for (let lat = -30; lat <= 60; lat += 30) {
        const left = project(-180, lat);
        const right = project(180, lat);
        graticuleLayer.appendChild(svgElement("path", {
          class: "map-graticule",
          d: `M${formatPoint(left)}L${formatPoint(right)}`
        }));
      }

      [-35, 0, 35].forEach((lat, index) => {
        const p0 = project(-180, lat);
        const p1 = project(-60, lat + (index === 1 ? 8 : 4));
        const p2 = project(60, lat - (index === 1 ? 8 : 4));
        const p3 = project(180, lat);
        currentLayer.appendChild(svgElement("path", {
          class: "map-current",
          d: `M${formatPoint(p0)}C${formatPoint(p1)} ${formatPoint(p2)} ${formatPoint(p3)}`
        }));
      });

      LAND_PATHS.forEach((d) => {
        landLayer.appendChild(svgElement("path", { class: "land", d }));
      });
    }

      if (!thumbnailCityIds.has(city.id)) return;
      const clipPath = svgElement("clipPath", {
        id: `thumb-clip-${city.id}`,
        clipPathUnits: "userSpaceOnUse"
      });
      clipPath.appendChild(svgElement("circle", {
        cx: point.x.toFixed(1),
        cy: point.y.toFixed(1),
        r: "28"
      }));
      thumbnailDefs.appendChild(clipPath);
    }

    function syncView() {
      saved = readSaved();
      const visitedElements = [];
      document.querySelectorAll("[data-city-id]").forEach((element) => {
        const isVisited = saved.has(element.dataset.cityId);
        element.classList.toggle("is-visited", isVisited);
        if (isVisited && element.classList.contains("city-marker")) visitedElements.push(element);
      });
      visitedElements.forEach((element) => {
        markerLayer.appendChild(element);
      });
    }

    drawBaseMap();

    cities.forEach((city) => {
      const point = project(city.lon, city.lat);
      createThumbnailClip(city, point);
      const marker = document.createElementNS("http://www.w3.org/2000/svg", "g");
      marker.classList.add("city-marker");
      marker.classList.toggle("has-thumbnail", thumbnailCityIds.has(city.id));
      marker.dataset.cityId = city.id;
      marker.setAttribute("role", "link");
      marker.setAttribute("tabindex", "0");
      marker.setAttribute("aria-label", `${city.name}のページへ移動`);
      marker.innerHTML = `<title>${city.name}</title><circle class="marker-hit" cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="12"></circle><circle class="marker-halo" cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="10"></circle><circle class="marker-core" cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="5"></circle><image class="marker-thumb" href="/${city.id}/header.png" x="${(point.x - 28).toFixed(1)}" y="${(point.y - 28).toFixed(1)}" width="56" height="56" preserveAspectRatio="xMidYMid slice" clip-path="url(#thumb-clip-${city.id})"></image><circle class="marker-thumb-frame" cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="28"></circle>`;
      marker.addEventListener("click", () => {
        window.location.href = `/${city.id}/`;
      });
      marker.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          window.location.href = `/${city.id}/`;
        }
      });
      markerLayer.appendChild(marker);
    });

    syncView();
    window.addEventListener("pageshow", syncView);
    window.addEventListener("storage", (event) => {
      if (event.key === storageKey) syncView();
    });
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") syncView();
    });
  </script>
</body>
</html>
